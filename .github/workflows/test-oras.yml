name: Test ORAS Multi Platform

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test-oras.yml"
      - "action.yml"
      - "dist/**"
  pull_request:
    paths:
      - ".github/workflows/test-oras.yml"
      - "action.yml"
      - "dist/**"

permissions:
  contents: read

env:
  ORAS_TAG: v1.3.2
  ORAS_VERSION: 1.3.2

jobs:
  install-oras:
    name: Install oras-project/oras on ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            uname: x86_64
            oras_os_arch: linux/amd64
            asset: oras_1.3.2_linux_amd64.tar.gz
          - arch: arm64
            runner: ubuntu-24.04-arm
            uname: aarch64
            oras_os_arch: linux/arm64
            asset: oras_1.3.2_linux_arm64.tar.gz
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify runner architecture and clean PATH
        run: |
          set -euo pipefail
          test "$(uname -m)" = "${{ matrix.uname }}"
          ! command -v oras

      - name: Install ORAS from GitHub release
        id: install
        uses: ./
        with:
          repository: oras-project/oras
          tag: ${{ env.ORAS_TAG }}
          cache: "true"

      - name: Verify ORAS is on PATH
        env:
          ASSET_NAME: ${{ steps.install.outputs.asset-name }}
          BIN_DIRS: ${{ steps.install.outputs.bin-dirs }}
          BINARY_PATHS: ${{ steps.install.outputs.binary-paths }}
        run: |
          set -euo pipefail

          test "${ASSET_NAME}" = "${{ matrix.asset }}"
          jq -e 'length == 1' <<<"${BIN_DIRS}"
          jq -e 'length == 1' <<<"${BINARY_PATHS}"

          _bin_dir="$(jq -r '.[0]' <<<"${BIN_DIRS}")"
          test "$(command -v oras)" = "${_bin_dir}/oras"

          oras version | grep -F "Version:        ${ORAS_VERSION}"
          oras version | grep -F "OS/Arch:        ${{ matrix.oras_os_arch }}"
